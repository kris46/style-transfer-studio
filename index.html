<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xAI Style Transfer Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Range Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid #3b82f6;
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
        }
        
        /* Comparison Slider Logic */
        .comparison-container {
            position: relative;
            overflow: hidden;
            user-select: none;
        }
        .img-overlay {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 50%; /* Initial state */
            background-size: cover;
            background-position: left center;
            border-right: 2px solid white;
            overflow: hidden;
            z-index: 10;
        }
        .img-original {
            width: 100%;
            height: auto;
            display: block;
        }
        
        /* Loading Spinner */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="p-6 border-b border-gray-800 bg-gray-900 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                Style Studio
            </h1>
            <div class="text-xs text-gray-500">Krisworld</div>
        </div>
    </header>

    <main class="flex-grow p-4 md:p-8">
        <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Controls Panel -->
            <div class="lg:col-span-1 space-y-6">
                
                <!-- API Key Section -->
                <div class="bg-gray-800 p-5 rounded-xl shadow-lg border border-gray-700">
                    <label class="block text-sm font-medium text-gray-400 mb-2">xAI API Key</label>
                    <input type="password" id="apiKey" placeholder="sk-..." class="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-white focus:outline-none focus:border-blue-500 transition">
                    <p class="text-xs text-gray-500 mt-2">Key is stored locally in your browser. (100% secure) you can get it from https://console.x.ai/ </p>
                </div>

                <!-- Upload Section -->
                <div class="bg-gray-800 p-5 rounded-xl shadow-lg border border-gray-700">
                    <label class="block text-sm font-medium text-gray-400 mb-2">1. Upload Source Image</label>
                    <div class="relative group">
                        <input type="file" id="imageInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20">
                        <div class="border-2 border-dashed border-gray-600 rounded-lg p-8 text-center group-hover:border-blue-500 transition">
                            <span class="text-gray-400 group-hover:text-blue-400" id="fileName">Click to upload image</span>
                        </div>
                    </div>
                </div>

                <!-- Style Selection -->
                <div class="bg-gray-800 p-5 rounded-xl shadow-lg border border-gray-700">
                    <label class="block text-sm font-medium text-gray-400 mb-2">2. Select Aesthetic</label>
                    <select id="styleSelect" class="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-white focus:outline-none focus:border-blue-500 mb-4">
                        <option value="">-- Choose a Style --</option>
                        <!-- Options populated by JS -->
                    </select>

                    <div id="customPromptContainer" class="hidden">
                        <label class="block text-xs text-gray-500 mb-1">Or write your own:</label>
                        <textarea id="customPrompt" rows="3" class="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-white text-sm focus:outline-none focus:border-blue-500" placeholder="Describe the style..."></textarea>
                    </div>
                </div>

                <!-- Action Button -->
                <button id="generateBtn" disabled class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold py-4 rounded-xl shadow-lg transform transition active:scale-95 flex justify-center items-center gap-2">
                    <span>Transform Image</span>
                    <div id="btnLoader" class="loader hidden w-4 h-4 border-2"></div>
                </button>
            </div>

            <!-- Preview Panel -->
            <div class="lg:col-span-2">
                <div class="bg-gray-800 rounded-xl shadow-lg border border-gray-700 p-1 min-h-[500px] flex items-center justify-center relative overflow-hidden">
                    
                    <!-- Placeholder State -->
                    <div id="placeholder" class="text-center p-8">
                        <div class="text-6xl mb-4">🎨</div>
                        <h3 class="text-xl font-bold text-gray-300">Ready to Create</h3>
                        <p class="text-gray-500">Upload an image and select a style to begin.</p>
                    </div>

                    <!-- Comparison Viewer -->
                    <div id="resultContainer" class="hidden w-full h-full relative group select-none">
                        
                        <!-- The Container for the Overlay -->
                        <div class="comparison-container w-full h-full relative bg-black rounded-lg overflow-hidden" id="compContainer">
                            <!-- Base Image (Original) -->
                            <img id="baseImage" src="" class="img-original w-full h-full object-contain">
                            
                            <!-- Overlay Image (Transformed) -->
                            <div id="overlayImage" class="img-overlay bg-no-repeat bg-contain">
                                <!-- Background image set via JS -->
                            </div>

                            <!-- Slider Handle -->
                            <div id="sliderHandle" class="absolute top-0 bottom-0 w-1 bg-white shadow-lg pointer-events-none flex items-center justify-center" style="left: 50%;">
                                <div class="w-8 h-8 bg-white rounded-full shadow-md flex items-center justify-center text-blue-600 font-bold text-xs">
                                    ⇄
                                </div>
                            </div>
                        </div>

                        <!-- Range Input (Invisible but functional) -->
                        <input type="range" min="0" max="100" value="50" class="absolute inset-0 w-full h-full opacity-0 cursor-ew-resize z-20" id="sliderRange">
                        
                        <!-- Labels -->
                        <div class="absolute top-4 left-4 bg-black/50 backdrop-blur px-3 py-1 rounded text-xs font-bold text-white">ORIGINAL</div>
                        <div class="absolute top-4 right-4 bg-black/50 backdrop-blur px-3 py-1 rounded text-xs font-bold text-white">TRANSFORMED</div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script>
        // --- 1. The 25 Prompts Data ---
        const styles = [
            { name: "Van Gogh Starry Night", prompt: "Rendered in the style of Vincent van Gogh, with thick impasto brushstrokes, swirling yellow skies, and vibrant blue contrasts." },
            { name: "Renaissance Oil Painting", prompt: "A classical Renaissance oil painting with dramatic chiaroscuro lighting, rich varnished tones, and ornate golden details." },
            { name: "Impressionist Watercolor", prompt: "A delicate Monet-style watercolor with soft bleeding edges, pastel hues, and visible paper texture." },
            { name: "Japanese Ukiyo-e", prompt: "A traditional Japanese woodblock print (Ukiyo-e) with flat colors, bold outlines, and a textured washi paper background." },
            { name: "Pencil Sketch", prompt: "A hyper-realistic graphite pencil drawing with precise shading, smudged details, and white paper texture." },
            { name: "Cyberpunk City", prompt: "A gritty cyberpunk aesthetic with neon blue and pink lighting, rain-slicked surfaces, and holographic overlays." },
            { name: "Film Noir", prompt: "A high-contrast black and white film noir shot with heavy shadows, venetian blind shadows, and cigarette smoke haze." },
            { name: "Wes Anderson Film", prompt: "A symmetrical Wes Anderson film still featuring a pastel color palette, deadpan expressions, and vintage props." },
            { name: "1980s Synthwave", prompt: "An 80s retro synthwave album cover with a glowing neon grid landscape, setting sun, and VHS tape distortion effects." },
            { name: "Zombie Apocalypse", prompt: "A gritty post-apocalyptic style with desaturated colors, heavy dirt textures, decay, and dramatic survival horror lighting." },
            { name: "Studio Ghibli Anime", prompt: "A beautiful Studio Ghibli anime style with lush, hand-painted backgrounds, soft lighting, and expressive characters." },
            { name: "16-Bit Pixel Art", prompt: "A retro 16-bit video game RPG style with a limited color palette, blocky pixels, and a pixel-font UI overlay." },
            { name: "Claymation", prompt: "A stop-motion claymation look (like Wallace & Gromit) with visible fingerprints, malleable textures, and soft studio lighting." },
            { name: "Low Poly 3D", prompt: "A clean low poly 3D render with sharp geometric facets and flat, matte shading." },
            { name: "Unreal Engine 5 Render", prompt: "A hyper-realistic 3D render using Unreal Engine 5, featuring ray-tracing, volumetric fog, and photorealistic materials." },
            { name: "Stained Glass Window", prompt: "Reimagined as a majestic stained glass window with bold black lead lines and vibrant, translucent light shining through." },
            { name: "LEGO Bricks", prompt: "Built entirely out of LEGO bricks, featuring plastic sheen, distinct studs, and primary colors." },
            { name: "Cross-Stitch Embroidery", prompt: "A cross-stitch embroidery pattern where the image is made of tiny X-shaped threads on aida cloth." },
            { name: "Street Art Graffiti", prompt: "A vibrant urban street art mural with spray paint drips, bubble letter tags, and a rough brick wall texture." },
            { name: "Voxel Art", prompt: "A 3D voxel art style (like Minecraft) where the subject is constructed from blocky cubes." },
            { name: "Steampunk", prompt: "A Victorian steampunk transformation featuring brass gears, steam vents, clockwork mechanisms, and leather textures." },
            { name: "Double Exposure", prompt: "A surreal double exposure photography effect blending the subject's silhouette with a forest or mountain landscape." },
            { name: "Pop Art Comic", prompt: "A 1960s Pop Art comic book style with halftone dot patterns, bold black outlines, and vibrant primary colors." },
            { name: "Snow Globe", prompt: "Encased inside a magical snow globe with swirling glitter snow, glass refraction distortions, and a wooden base." },
            { name: "Ink in Water", prompt: "A fluid abstract style made of swirling colored ink drops dispersing in water, creating organic, smoke-like shapes." },
            { name: "✨ Custom Prompt", prompt: "custom" }
        ];

        // --- 2. DOM Elements ---
        const apiKeyInput = document.getElementById('apiKey');
        const imageInput = document.getElementById('imageInput');
        const fileNameSpan = document.getElementById('fileName');
        const styleSelect = document.getElementById('styleSelect');
        const customPromptContainer = document.getElementById('customPromptContainer');
        const customPromptInput = document.getElementById('customPrompt');
        const generateBtn = document.getElementById('generateBtn');
        const btnLoader = document.getElementById('btnLoader');
        
        const placeholder = document.getElementById('placeholder');
        const resultContainer = document.getElementById('resultContainer');
        const baseImage = document.getElementById('baseImage');
        const overlayImage = document.getElementById('overlayImage');
        const sliderRange = document.getElementById('sliderRange');
        const sliderHandle = document.getElementById('sliderHandle');
        const compContainer = document.getElementById('compContainer');

        let currentBase64 = null;

        // --- 3. Initialization ---
        
        // Load saved API Key
        const savedKey = localStorage.getItem('xAiApiKey');
        if (savedKey) apiKeyInput.value = savedKey;

        // Populate Dropdown
        styles.forEach(style => {
            const option = document.createElement('option');
            option.value = style.prompt;
            option.textContent = style.name;
            styleSelect.appendChild(option);
        });

        // --- 4. Event Listeners ---

        // Save API Key on change
        apiKeyInput.addEventListener('input', (e) => {
            localStorage.setItem('xAiApiKey', e.target.value);
            validateForm();
        });

        // Handle Image Upload
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                fileNameSpan.textContent = file.name;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    currentBase64 = evt.target.result; // Data URL
                    validateForm();
                };
                reader.readAsDataURL(file);
            }
        });

        // Handle Style Selection
        styleSelect.addEventListener('change', (e) => {
            if (e.target.value === 'custom') {
                customPromptContainer.classList.remove('hidden');
            } else {
                customPromptContainer.classList.add('hidden');
            }
            validateForm();
        });

        customPromptInput.addEventListener('input', validateForm);

        // Validate Form State
        function validateForm() {
            const hasKey = apiKeyInput.value.length > 10;
            const hasImage = !!currentBase64;
            const hasStyle = styleSelect.value !== '';
            
            if (styleSelect.value === 'custom') {
                generateBtn.disabled = !(hasKey && hasImage && customPromptInput.value.length > 0);
            } else {
                generateBtn.disabled = !(hasKey && hasImage && hasStyle);
            }
        }

        // --- 5. Generation Logic (The API Call) ---
        
        generateBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value;
            let prompt = styleSelect.value;
            
            if (prompt === 'custom') {
                prompt = customPromptInput.value;
            }

            // UI Loading State
            generateBtn.disabled = true;
            btnLoader.classList.remove('hidden');
            generateBtn.querySelector('span').textContent = "Dreaming...";

            try {
                // Note: xAI API Implementation details based on standard Vision/Image endpoints.
                // If the specific endpoint differs slightly, this is where to adjust.
                
                // Construct payload
                // We strip the "data:image/jpeg;base64," prefix if the API requires raw base64, 
                // but usually modern APIs accept the full Data URI.
                
                const response = await fetch("https://api.x.ai/v1/images/generations", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "grok-2-image", // Or specific model ID for style transfer
                        prompt: prompt,
                        image: currentBase64, // Sending the source image for style transfer
                        n: 1,
                        response_format: "b64_json" // Requesting base64 back for immediate display
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || "Failed to generate image");
                }

                const data = await response.json();
                // Adjust data parsing based on actual xAI response structure
                // Assuming standard OpenAI-compatible structure often used:
                const resultImageBase64 = data.data[0].b64_json; 
                const resultUrl = `data:image/png;base64,${resultImageBase64}`;

                showResult(resultUrl);

            } catch (error) {
                alert(`Error: ${error.message}\nPlease check your API Key and try again.`);
            } finally {
                generateBtn.disabled = false;
                btnLoader.classList.add('hidden');
                generateBtn.querySelector('span').textContent = "Transform Image";
                validateForm();
            }
        });

        // --- 6. Slider & Display Logic ---

        function showResult(transformedImageUrl) {
            // Hide placeholder, show slider
            placeholder.classList.add('hidden');
            resultContainer.classList.remove('hidden');

            // Set images
            baseImage.src = currentBase64;
            overlayImage.style.backgroundImage = `url(${transformedImageUrl})`;

            // Reset Slider
            sliderRange.value = 50;
            updateSlider(50);
        }

        sliderRange.addEventListener('input', (e) => {
            updateSlider(e.target.value);
        });

        function updateSlider(val) {
            // Calculate percentage
            const percentage = val + "%";
            
            // Move the overlay width
            overlayImage.style.width = percentage;
            
            // Move the handle
            sliderHandle.style.left = percentage;
        }

    </script>
</body>
</html>
